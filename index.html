<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Brush Lab v2</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
  background: #1b1b1b;
  color: white;
}

#panel {
  width: 320px;
  background: #2a2a2a;
  padding: 10px;
  box-sizing: border-box;
  overflow-y: auto;
}

canvas {
  border: 1px solid #444;
}

#wrap {
  display: flex;
  flex: 1;
}

#left, #right {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

label {
  font-size: 12px;
  margin-top: 6px;
  display: block;
}

input {
  width: 100%;
}

button {
  width: 100%;
  margin-top: 6px;
}
</style>
</head>

<body>

<div id="panel">
  <h3>Brush Lab v2</h3>

  <label>Size</label>
  <input id="size" type="range" min="1" max="80" value="20">

  <label>Opacity</label>
  <input id="opacity" type="range" min="1" max="100" value="80">

  <label>Flow</label>
  <input id="flow" type="range" min="1" max="100" value="50">

  <label>Spacing</label>
  <input id="spacing" type="range" min="1" max="50" value="10">

  <label>Scatter</label>
  <input id="scatter" type="range" min="0" max="30" value="5">

  <label>Angle Jitter</label>
  <input id="angle" type="range" min="0" max="180" value="0">

  <label>Texture Strength</label>
  <input id="texStrength" type="range" min="0" max="100" value="50">

  <label>Hardness</label>
  <input id="hardness" type="range" min="1" max="100" value="80">

  <button onclick="saveBrush()">Save Brush</button>
  <button onclick="loadBrush()">Load Brush</button>
  <button onclick="clearPreview()">Clear Preview</button>
</div>

<div id="wrap">
  <div id="left">
    <h4>Texture Painter</h4>
    <canvas id="texCanvas" width="250" height="250"></canvas>
    <button onclick="clearTexture()">Clear Texture</button>
  </div>

  <div id="right">
    <h4>Preview</h4>
    <canvas id="preview" width="600" height="500"></canvas>
  </div>
</div>

<script>
const texCanvas = document.getElementById("texCanvas");
const tctx = texCanvas.getContext("2d");

const preview = document.getElementById("preview");
const ctx = preview.getContext("2d");

let drawingTex = false;
let drawingPreview = false;
let last = null;

let brush = {
  size: 20,
  opacity: 0.8,
  flow: 0.5,
  spacing: 10,
  scatter: 5,
  angle: 0,
  texStrength: 0.5,
  hardness: 0.8
};

// UI update
function updateBrush() {
  brush.size = +size.value;
  brush.opacity = +opacity.value / 100;
  brush.flow = +flow.value / 100;
  brush.spacing = +spacing.value;
  brush.scatter = +scatter.value;
  brush.angle = +angle.value;
  brush.texStrength = +texStrength.value / 100;
  brush.hardness = +hardness.value / 100;
}

document.querySelectorAll("input").forEach(i =>
  i.addEventListener("input", updateBrush)
);

// ===== TEXTURE PAINTER =====
texCanvas.addEventListener("mousedown", e => {
  drawingTex = true;
  tctx.beginPath();
});

texCanvas.addEventListener("mouseup", () => drawingTex = false);

texCanvas.addEventListener("mousemove", e => {
  if (!drawingTex) return;

  tctx.fillStyle = "white";
  tctx.strokeStyle = "white";
  tctx.lineWidth = 10;
  tctx.lineCap = "round";

  tctx.lineTo(e.offsetX, e.offsetY);
  tctx.stroke();
  tctx.beginPath();
  tctx.moveTo(e.offsetX, e.offsetY);
});

// ===== PREVIEW BRUSH =====
function dist(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

function drawBrush(x,y,pressure=1,angle=0){
  const size = brush.size * pressure;

  const offX = (Math.random()-0.5) * brush.scatter;
  const offY = (Math.random()-0.5) * brush.scatter;

  const alpha = brush.opacity * brush.flow;

  ctx.save();
  ctx.translate(x+offX, y+offY);
  ctx.rotate(angle);

  // softness simulation
  const gradient = ctx.createRadialGradient(0,0,0,0,0,size);
  gradient.addColorStop(0, `rgba(255,255,255,${alpha})`);
  gradient.addColorStop(1, `rgba(255,255,255,0)`);

  ctx.fillStyle = gradient;

  ctx.beginPath();
  ctx.arc(0,0,size,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

preview.addEventListener("mousedown", e => {
  drawingPreview = true;
  last = {x:e.offsetX,y:e.offsetY};
});

preview.addEventListener("mouseup", () => {
  drawingPreview = false;
  last = null;
});

preview.addEventListener("mousemove", e => {
  if (!drawingPreview) return;

  const cur = {x:e.offsetX,y:e.offsetY};
  const d = dist(last, cur);

  if (d > brush.spacing) {
    const pressure = Math.min(d/10, 2);

    const angle = brush.angle * (Math.PI/180);

    drawBrush(cur.x, cur.y, pressure, angle);
    last = cur;
  }
});

function clearPreview(){
  ctx.clearRect(0,0,preview.width,preview.height);
}

function clearTexture(){
  tctx.clearRect(0,0,texCanvas.width,texCanvas.height);
}

// ===== SAVE / LOAD =====
function saveBrush(){
  const texture = texCanvas.toDataURL();

  const data = {
    ...brush,
    texture
  };

  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "brush.json";
  a.click();
}

function loadBrush(){
  const input = document.createElement("input");
  input.type = "file";

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = ev => {
      const data = JSON.parse(ev.target.result);
      brush = data;

      size.value = brush.size;
      opacity.value = brush.opacity * 100;
      flow.value = brush.flow * 100;
      spacing.value = brush.spacing;
      scatter.value = brush.scatter;
      angle.value = brush.angle;
      texStrength.value = brush.texStrength * 100;
      hardness.value = brush.hardness;

      const img = new Image();
      img.onload = () => {
        tctx.clearRect(0,0,texCanvas.width,texCanvas.height);
        tctx.drawImage(img,0,0);
      };
      img.src = brush.texture;
    };

    reader.readAsText(file);
  };

  input.click();
}
</script>

</body>
</html>
